name: Nightly

# Tests plugin against formae main branch to catch SDK regressions before release.
# PEL-maintained plugins only.

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC
  workflow_dispatch:
    inputs:
      formae_branch:
        description: "Formae branch to build from (default: main)"
        required: false
        default: "main"
        type: string
      skip_makefile_align:
        description: "Skip Makefile branch alignment (test the triggered branch as-is)"
        required: false
        default: false
        type: boolean

jobs:
  # Integration tests run against real Azure resources.
  # These are self-contained: each test creates and cleans up its own resources.
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Configure Azure Credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run integration tests
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: make test-integration

  conformance-tests-main:
    needs: [test-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    strategy:
      fail-fast: false
      matrix:
        resource:
          - resource-group
          - virtual-network
          - subnet
          - network-security-group
          - public-ip-address
          - storage-account
          - registry
          - vault
          # flexible-server and firewall-rule excluded from nightly due to formae core
          # discovery persistence bug (discovered resources not appearing in inventory).
          # CRUD tests still run via test-integration.
          - role-assignment
          - user-assigned-identity
          - maintenance-configuration
          - trusted-access-role-binding
          # extension and flux-configuration excluded: each requires AKS cluster (~8m) +
          # extension install (~5m), exceeding the 10m command timeout. CRUD validated locally.
          # trusted-access-role-binding and maintenance-configuration work because they only
          # need the AKS cluster, not an extension on top of it.

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build formae
        run: |
          BRANCH="${{ inputs.formae_branch || 'main' }}"
          echo "Building formae from branch: ${BRANCH}"
          git clone --branch "${BRANCH}" --depth 1 https://github.com/platform-engineering-labs/formae.git /tmp/formae
          cd /tmp/formae
          # Fetch tags with enough depth for `git describe` to resolve version
          git fetch --tags --unshallow
          make build
          echo "FORMAE_BINARY=/tmp/formae/formae" >> $GITHUB_ENV

      - name: Track formae clone
        if: env.POSTHOG_API_KEY != ''
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          REPO=$(basename "$(git remote get-url origin)" .git 2>/dev/null || echo "unknown")
          curl -sf -o /dev/null https://k.platform.engineering/capture/ \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg api_key "$POSTHOG_API_KEY" \
              --arg repo "$REPO" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg run_id "${GITHUB_RUN_ID:-}" \
              '{
                api_key: $api_key,
                distinct_id: "formae-ci",
                event: "ci_repo_clone",
                timestamp: $ts,
                properties: {
                  "$process_person_profile": false,
                  repo: $repo,
                  cloned_repo: "formae",
                  ci_run_id: $run_id
                }
              }')" || echo "[telemetry] event send failed (non-critical)" >&2

      # Temporary: until Orbital package manager handles plugin version
      # coordination, the formae Makefile is the source of truth for which
      # plugin branch to build against. Parse the @ref suffix and check
      # out that ref so the plugin is compatible with the formae binary.
      - name: Align plugin branch with formae Makefile
        if: ${{ !inputs.skip_makefile_align }}
        run: |
          PLUGIN_NAME=$(basename "${{ github.repository }}")
          REF=$(grep "${PLUGIN_NAME}" /tmp/formae/Makefile \
            | grep -o '@[^[:space:]\\]*' \
            | head -1 \
            | sed 's/^@//')
          if [ -n "$REF" ]; then
            echo "Formae Makefile pins ${PLUGIN_NAME} to ref: ${REF}"
            git fetch origin "${REF}"
            git checkout "${REF}"
          else
            echo "No ref override for ${PLUGIN_NAME}, staying on default branch"
          fi

      - name: Configure Azure Credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Inject formae replace directives
        run: |
          FORMAE_SRC=/tmp/formae
          for pkg in pkg/auth pkg/model pkg/plugin pkg/plugin-conformance-tests; do
            if grep -q "formae/$pkg" go.mod 2>/dev/null; then
              echo "Injecting replace for $pkg -> $FORMAE_SRC/$pkg"
              go mod edit -replace "github.com/platform-engineering-labs/formae/$pkg=$FORMAE_SRC/$pkg"
            fi
          done
          go mod tidy

      - name: Install plugin
        run: make install

      - name: Run conformance tests against main (${{ matrix.resource }})
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FORMAE_TEST_RUN_ID: nightly-main-${{ github.run_id }}-${{ matrix.resource }}
          FORMAE_TEST_FILTER: ${{ matrix.resource }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: make conformance-test

  # Clean up Azure resources after all matrix jobs complete
  cleanup:
    needs: [conformance-tests-main]
    runs-on: ubuntu-latest
    if: always()
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Configure Azure Credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clean up test resources
        run: ./scripts/ci/clean-environment.sh

  # Notify when nightly is fixed (was red, now green)
  notify-fixed:
    needs: [test-integration, conformance-tests-main]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Check if previous run failed
        id: check_previous
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yml',
              per_page: 2,
              status: 'completed'
            });

            // Get previous run (skip current which isn't completed yet)
            const previousRun = runs.data.workflow_runs.find(run => run.id !== context.runId);

            if (previousRun && previousRun.conclusion === 'failure') {
              return 'true';
            }
            return 'false';
          result-encoding: string

      - name: Notify Slack (Fixed)
        if: steps.check_previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: Nightly fixed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Nightly fixed* on `${{ github.repository }}`\n\nPlugin conformance tests now passing against formae main branch."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # Notify on failure
  notify-failure:
    needs: [test-integration, conformance-tests-main]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":warning: Nightly build failed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Nightly build failed* on `${{ github.repository }}`\n\nPlugin conformance tests failed against formae main branch. This may indicate an SDK regression."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
