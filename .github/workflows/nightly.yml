name: Nightly

# Tests plugin against formae main branch to catch SDK regressions before release.
# PEL-maintained plugins only.

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC
  workflow_dispatch:
    inputs:
      formae_branch:
        description: "Formae branch to build from (default: main)"
        required: false
        default: "0.84.0"
        type: string
      skip_makefile_align:
        description: "Skip Makefile branch alignment (test the triggered branch as-is)"
        required: false
        default: false
        type: boolean

# Share the conformance lock with ci.yml so nightly and CI never run
# conformance against the same Azure test subscription at once.
concurrency:
  group: azure-conformance-tests
  cancel-in-progress: false

jobs:
  # Integration tests are mock-based (fake SDK clients) and need no cloud creds.
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run integration tests
        run: make test-integration

  # Build formae once and share the binary across conformance jobs
  build-formae:
    needs: [test-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build formae
        run: |
          BRANCH="${{ inputs.formae_branch || 'main' }}"
          echo "Building formae from branch: ${BRANCH}"
          git clone --branch "${BRANCH}" --depth 1 https://github.com/platform-engineering-labs/formae.git /tmp/formae
          cd /tmp/formae
          git fetch --tags --unshallow
          make build
          /tmp/formae/formae --version
          mkdir -p /tmp/formae-install/bin /tmp/formae-install/.ops
          touch /tmp/formae-install/.ops/.keep
          cp /tmp/formae/formae /tmp/formae-install/bin/formae

      - name: Track formae clone
        if: env.POSTHOG_API_KEY != ''
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          REPO=$(basename "$(git remote get-url origin)" .git 2>/dev/null || echo "unknown")
          curl -sf -o /dev/null https://k.platform.engineering/capture/ \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg api_key "$POSTHOG_API_KEY" \
              --arg repo "$REPO" \
              --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg run_id "${GITHUB_RUN_ID:-}" \
              '{
                api_key: $api_key,
                distinct_id: "formae-ci",
                event: "ci_repo_clone",
                timestamp: $ts,
                properties: {
                  "$process_person_profile": false,
                  repo: $repo,
                  cloned_repo: "formae",
                  ci_run_id: $run_id
                }
              }')" || echo "[telemetry] event send failed (non-critical)" >&2

      - name: Upload formae install tree
        uses: actions/upload-artifact@v7
        with:
          name: formae-install
          path: /tmp/formae-install
          include-hidden-files: true
          retention-days: 1

      - name: Upload formae source (for replace directives)
        uses: actions/upload-artifact@v7
        with:
          name: formae-source
          path: /tmp/formae
          retention-days: 1

  conformance-tests-main:
    needs: [build-formae]
    runs-on: ubuntu-latest
    # 120 min: Front Door (cdn-*) and App Gateway lifecycles run ~36 min each.
    timeout-minutes: 120
    environment: production

    strategy:
      fail-fast: false
      matrix:
        resource:
          - resource-group
          - virtual-network
          - subnet
          - network-security-group
          - public-ip-address
          - storage-account
          - registry
          - vault
          # secret excluded from nightly until the CI principal is granted a
          # Key Vault data-plane role ("Key Vault Secrets Officer"). Writing a
          # secret is a data-plane operation: the service principal can create
          # the vault via ARM but cannot write its secrets without that role.
          # CRUD is validated via test-integration (mocked); run live locally
          # with: make conformance-test-crud TEST=secret
          # - secret
          - sql-server
          - sql-database
          # sql-firewall-rule excluded from nightly due to the same formae core
          # discovery persistence bug as flexible-server/firewall-rule below
          # (discovered resources not appearing in inventory). CRUD validated locally.
          # sql-ad-administrator excluded from nightly: needs a real Azure AD
          # principal (sid/tenantId); placeholder fixtures fail provisioning.
          # flexible-server and firewall-rule excluded from nightly due to formae core
          # discovery persistence bug (discovered resources not appearing in inventory).
          # CRUD tests still run via test-integration.
          - role-assignment
          - user-assigned-identity
          - federated-identity-credential
          - load-balancer
          - application-gateway
          - waf-policy
          # certificate (AZURE::KeyVault::Certificate) excluded from nightly for the same
          # reason as `secret`: it is a Key Vault DATA-PLANE resource and the CI principal
          # lacks the "Key Vault Certificates Officer" role. CRUD validated via
          # test-integration (mocked); run live locally with:
          # make conformance-test-crud TEST=certificate
          - dns-zone
          - dns-record-set
          - private-dns-zone
          - private-dns-vnet-link
          - private-endpoint
          - private-dns-zone-group
          - blob-container
          - disk
          - virtual-machine-scale-set
          # Azure Front Door Standard (Microsoft.Cdn AFD) — profile provisioning is
          # minutes-slow + billed. cdn-route stands up the full AFD chain.
          - cdn-profile
          - cdn-afd-endpoint
          - cdn-afd-origin-group
          - cdn-afd-origin
          # cdn-route excluded: Route references two siblings (origin group + endpoint)
          # created in the same apply, reliably tripping the formae core resolve-cache
          # race (ResolveCacheMissingInAction) on first apply — 3/3 live attempts failed
          # while siblings succeeded. Not a plugin bug (round-trip unit test + the other
          # 4 cdn resources pass live). Re-enable when the core race is fixed.
          # cdn-afd-custom-domain and cdn-secret excluded from nightly: custom-domain
          # needs a REAL owned domain (Azure _dnsauth TXT challenge), secret needs a real
          # Key Vault cert + AFD SP vault access. CRUD validated via test-integration
          # (mocked) + round-trip; run live locally with a real domain/cert.
          # Container Apps (managed-environment, container-app) excluded from nightly:
          # environment provisioning (~5 min, container-app builds on top) exceeds the
          # command timeout, same class as the AKS extension; both billed. CRUD validated
          # via test-integration (mocked); run live locally with TIMEOUT=15.
          # extension and flux-configuration excluded: each requires AKS cluster (~8m) +
          # extension install (~5m), exceeding the 10m command timeout. CRUD validated locally.
          # maintenance-configuration and trusted-access-role-binding excluded: Create returns
          # empty NativeID in ~9s (fails before Azure API call). Plugin-side diagnosis needed;
          # tracked as follow-up.
          - route-table
          # event-hub-namespace and service-bus-namespace excluded from nightly: both provision
          # correctly against live Azure (verified locally, Active), but first-apply of the
          # resource-group + namespace in a single command intermittently times out in the formae
          # core "resolving" state (ResolveCacheMissingInAction) and succeeds on re-apply. Nightly
          # does a single first-apply, so these would flake until the core resolve-cache race is
          # fixed. CRUD validated via test-integration (mocked) + local live apply.
          # - event-hub-namespace
          # - service-bus-namespace
          # virtual-machine-extension excluded: its fixture provisions the full parent chain
          # (rg, vnet, subnet, nic, vm) before the extension, which is too heavy/slow for the
          # 10m command timeout. CRUD validated via test-integration (mocked).
          # event-grid-system-topic excluded: the fixture is self-contained (creates its storage
          # account event source inline), but it has not been live-verified yet; enable after a
          # local conformance run confirms it. CRUD validated via test-integration (mocked).
          # cognitive-services-account excluded: may require subscription quota/approval
          # (Azure OpenAI kind in particular) not available to the CI principal.
          # grafana and grafana-managed-private-endpoint excluded: Managed Grafana provisioning is
          # slow (minutes) and the managed private endpoint needs a Grafana workspace + a
          # private-link target. Not yet live-verified; CRUD validated via test-integration.

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Download formae install tree
        uses: actions/download-artifact@v8
        with:
          name: formae-install
          path: /tmp/formae-install

      - name: Download formae source
        uses: actions/download-artifact@v8
        with:
          name: formae-source
          path: /tmp/formae

      - name: Set up formae binary
        run: |
          test -d /tmp/formae-install/.ops
          chmod +x /tmp/formae-install/bin/formae
          echo "FORMAE_BINARY=/tmp/formae-install/bin/formae" >> $GITHUB_ENV
          /tmp/formae-install/bin/formae --version

      # Temporary: until Orbital package manager handles plugin version
      # coordination, the formae Makefile is the source of truth for which
      # plugin branch to build against. Parse the @ref suffix and check
      # out that ref so the plugin is compatible with the formae binary.
      - name: Align plugin branch with formae Makefile
        if: ${{ !inputs.skip_makefile_align }}
        run: |
          PLUGIN_NAME=$(basename "${{ github.repository }}")
          REF=$(grep "${PLUGIN_NAME}" /tmp/formae/Makefile \
            | grep -o '@[^[:space:]\\]*' \
            | head -1 \
            | sed 's/^@//')
          if [ -n "$REF" ]; then
            echo "Formae Makefile pins ${PLUGIN_NAME} to ref: ${REF}"
            git fetch origin "${REF}"
            git checkout "${REF}"
          else
            echo "No ref override for ${PLUGIN_NAME}, staying on default branch"
          fi

      - name: Configure Azure Credentials
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Inject formae replace directives
        run: |
          FORMAE_SRC=/tmp/formae
          for pkg in pkg/auth pkg/model pkg/plugin pkg/plugin-conformance-tests; do
            if grep -q "formae/$pkg" go.mod 2>/dev/null; then
              echo "Injecting replace for $pkg -> $FORMAE_SRC/$pkg"
              go mod edit -replace "github.com/platform-engineering-labs/formae/$pkg=$FORMAE_SRC/$pkg"
            fi
          done
          go mod tidy

      - name: Install plugin
        run: make install

      - name: Run conformance tests against main (${{ matrix.resource }})
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FORMAE_TEST_RUN_ID: nightly-main-${{ github.run_id }}-${{ matrix.resource }}
          FORMAE_TEST_FILTER: ${{ matrix.resource }}
          # Wide per-command poll so slow resources (App Gateway, Front Door cdn-*)
          # don't time out; fast resources return well before these ceilings.
          FORMAE_TEST_TIMEOUT: "25"
          FORMAE_TEST_OOB_TIMEOUT: "25"
          FORMAE_TEST_OOB_DELETE_TIMEOUT: "25"
          FORMAE_TEST_DISCOVERY_TIMEOUT: "25"
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: make conformance-test TIMEOUT=75

  # Clean up Azure resources after all matrix jobs complete
  cleanup:
    needs: [conformance-tests-main]
    runs-on: ubuntu-latest
    if: always()
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v7

      - name: Configure Azure Credentials
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clean up test resources
        run: ./scripts/ci/clean-environment.sh

  # Notify when nightly is fixed (was red, now green). Scheduled runs only,
  # so branch dispatches do not post or pollute the comparison.
  notify-fixed:
    needs: [test-integration, conformance-tests-main]
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'schedule'
    steps:
      - name: Check if previous run failed
        id: check_previous
        uses: actions/github-script@v9
        with:
          script: |
            // A rerun of this same run counts as fixed if the prior attempt failed.
            const attempt = parseInt(process.env.GITHUB_RUN_ATTEMPT || '1', 10);
            if (attempt > 1) {
              const prev = await github.rest.actions.getWorkflowRunAttempt({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                attempt_number: attempt - 1
              });
              if (prev.data.conclusion === 'failure') {
                return 'true';
              }
            }

            // Otherwise compare against the previous scheduled run on main;
            // unfiltered, a dispatched branch run would shadow the comparison.
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nightly.yml',
              branch: 'main',
              event: 'schedule',
              per_page: 2,
              status: 'completed'
            });

            const previousRun = runs.data.workflow_runs.find(run => run.id !== context.runId);

            if (previousRun && previousRun.conclusion === 'failure') {
              return 'true';
            }
            return 'false';
          result-encoding: string

      - name: Notify Slack (Fixed)
        if: steps.check_previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v3.0.5
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: Nightly fixed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Nightly fixed* on `${{ github.repository }}`\n\nPlugin conformance tests now passing against formae main branch."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # Notify on failure. Scheduled runs only, so branch dispatches do not alert.
  notify-failure:
    needs: [test-integration, conformance-tests-main]
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'schedule'
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v3.0.5
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":warning: Nightly build failed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":warning: *Nightly build failed* on `${{ github.repository }}`\n\nPlugin conformance tests failed against formae main branch. This may indicate an SDK regression."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
