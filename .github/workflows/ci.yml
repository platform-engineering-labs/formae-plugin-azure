name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Serialize conformance across CI runs (and with nightly) so matrix jobs
# don't race for the same Azure test subscription. cancel-in-progress=false
# lets an in-flight run finish and cleanup rather than being killed mid-create.
concurrency:
  group: azure-conformance-tests
  cancel-in-progress: false

jobs:
  reuse-compliance:
    name: REUSE License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: fsfe/reuse-action@v6

  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build
        run: make build

      - name: Lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: latest

      - name: Unit tests
        run: make test-unit

      - name: Validate Pkl manifest
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

      - name: Verify schema
        run: make verify-schema

  # Integration tests are mock-based (fake SDK clients) and need no cloud creds.
  # Run on PRs too so they gate merges alongside conformance.
  test-integration:
    needs: [checks]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run integration tests
        run: make test-integration

  # Clear stale test resources before the conformance matrix runs, so a prior
  # aborted run can't collide with this one.
  pre-cleanup:
    needs: [checks, test-integration]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Azure Credentials
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clean up test resources
        run: ./scripts/ci/clean-environment.sh

  # Conformance runs the full CRUD + discovery lifecycle against real Azure
  # resources on every push, PR, and manual dispatch — so it gates merges.
  # The matrix is curated (not auto-discovered) to exclude resources with known
  # formae-core discovery bugs; see the exclusions below.
  conformance-tests:
    needs: [checks, test-integration, pre-cleanup]
    runs-on: ubuntu-latest
    # 90 min: App Gateway v2 runs both the CRUD lifecycle and discovery, each
    # provisioning a gateway (6-8 min per op). Fast resources finish well under this.
    timeout-minutes: 90

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        resource:
          - resource-group
          - virtual-network
          - subnet
          - network-security-group
          - public-ip-address
          - storage-account
          - registry
          - vault
          # flexible-server and firewall-rule excluded due to formae core
          # discovery persistence bug (discovered resources not appearing in inventory).
          # CRUD tests still run via test-integration.
          - role-assignment
          - user-assigned-identity
          - federated-identity-credential
          - load-balancer
          - application-gateway
          - private-dns-zone
          - private-dns-vnet-link
          - private-endpoint
          - private-dns-zone-group
          - blob-container
          - disk
          - virtual-machine-scale-set

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Configure Azure Credentials
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install plugin
        run: make install

      # CRUD and discovery run as separate steps with a fresh azure/login between
      # them. A single OIDC token stops refreshing partway through a long job
      # (App Gateway's lifecycle alone is ~35 min), after which every List fails
      # with "DefaultAzureCredential: failed to acquire a token". Re-authenticating
      # before discovery keeps each phase inside a fresh ~1h token window.
      #
      # FORMAE_TEST_FILTER scopes each job to its one resource — without it the
      # whole suite runs in every matrix job (20x work) and jobs delete each
      # other's resources. Cleanup is owned by the pre-/conformance-cleanup jobs;
      # the Makefile skips its inline cleanup when the filter is set.
      - name: Run CRUD conformance (${{ matrix.resource }})
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FORMAE_TEST_FILTER: ${{ matrix.resource }}
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.resource }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          set -euo pipefail
          TIMEOUT_ARG=""
          if [ "${{ matrix.resource }}" = "application-gateway" ]; then
            # App Gateway v2 create/update/delete each take 6-8 min. FORMAE_TEST_TIMEOUT
            # is the per-command poll (default 5 min — too short); TIMEOUT is the overall
            # go-test timeout for the whole lifecycle.
            export FORMAE_TEST_TIMEOUT=20 FORMAE_TEST_OOB_TIMEOUT=20 FORMAE_TEST_OOB_DELETE_TIMEOUT=20
            TIMEOUT_ARG="TIMEOUT=50"
          fi
          make conformance-test-crud-run $TIMEOUT_ARG

      - name: Re-authenticate for discovery
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run discovery conformance (${{ matrix.resource }})
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FORMAE_TEST_FILTER: ${{ matrix.resource }}
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.resource }}
          FORMAE_TEST_DISCOVERY_TIMEOUT: "5"
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          set -euo pipefail
          TIMEOUT_ARG=""
          if [ "${{ matrix.resource }}" = "application-gateway" ]; then
            export FORMAE_TEST_TIMEOUT=20 FORMAE_TEST_OOB_TIMEOUT=20 FORMAE_TEST_OOB_DELETE_TIMEOUT=20 FORMAE_TEST_DISCOVERY_TIMEOUT=20
            TIMEOUT_ARG="TIMEOUT=50"
          fi
          make conformance-test-discovery-run $TIMEOUT_ARG

  # Clean up Azure resources after all matrix jobs complete (always runs).
  conformance-cleanup:
    needs: [conformance-tests]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Azure Credentials
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clean up test resources
        run: ./scripts/ci/clean-environment.sh

  # Notify when build is fixed (was red, now green)
  notify-fixed:
    needs: [checks]
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'
    steps:
      - name: Check if previous run failed
        id: check_previous
        uses: actions/github-script@v9
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: context.ref.replace('refs/heads/', ''),
              per_page: 2,
              status: 'completed'
            });

            // Get previous run (skip current which isn't completed yet)
            const previousRun = runs.data.workflow_runs.find(run => run.id !== context.runId);

            if (previousRun && previousRun.conclusion === 'failure') {
              return 'true';
            }
            return 'false';
          result-encoding: string

      - name: Notify Slack (Fixed)
        if: steps.check_previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: CI fixed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *CI fixed* on `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # Notify on failure
  notify-failure:
    needs: [checks]
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'push'
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: CI failed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *CI failed* on `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
